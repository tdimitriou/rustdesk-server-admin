# Native glibc binary for Rocky Linux / RHEL-family hosts.
#
# This avoids cross/musl toolchains (e.g. cross + x86_64-unknown-linux-musl used for
# portable rustdesk-server tarballs). Those toolchains often surface confusing gcc/link
# errors; here the compiler is Rocky's own GCC from dnf, matching production EL9 systems.
name: Build Rocky Linux x86_64

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Also publish the tarball on a GitHub release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag when upload_release is true"
        required: true
        default: "admin-nightly"
        type: string

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  rocky9-amd64-gnu:
    name: rockylinux-9-amd64-gnu
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
    defaults:
      run:
        shell: sh
    env:
      # Match root’s home; GHA’s default HOME in containers confuses rustup.
      HOME: /root
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo
      # GHA docker exec often gets an empty PATH; without this, `bash` (and even `cargo`) is not found.
      PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      # git required for actions/checkout inside a container image
      # Do not install package "curl": base image has curl-minimal; adding curl conflicts.
      - name: Install OS packages (GCC, SQLite, file, bash)
        run: |
          dnf install -y bash gcc gcc-c++ git sqlite-devel ca-certificates findutils tar gzip file
          # Some tooling probes ~/.docker/config.json; silence permission noise on fresh /root.
          mkdir -p /root/.docker
          printf '%s\n' '{}' > /root/.docker/config.json

      - name: Checkout
        uses: actions/checkout@v6

      # dtolnay/rust-toolchain runs bash internally; GHA’s container exec often has no bash on PATH.
      - name: Install Rust stable (rustup via sh)
        shell: sh
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --profile minimal \
            --default-toolchain stable \
            --no-modify-path

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package tarball
        shell: sh
        run: |
          mkdir -p dist
          cp target/release/rustdesk-server-admin dist/
          strip dist/rustdesk-server-admin 2>/dev/null || true
          file dist/rustdesk-server-admin
          tar -C dist -czf rustdesk-server-admin-rocky9-x86_64-gnu.tar.gz rustdesk-server-admin

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: rustdesk-server-admin-rocky9-x86_64-gnu
          path: rustdesk-server-admin-rocky9-x86_64-gnu.tar.gz
          if-no-files-found: error

      - name: Publish release asset
        if: ${{ inputs.upload_release }}
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: ${{ inputs.release_tag }}
          overwrite_files: true
          files: rustdesk-server-admin-rocky9-x86_64-gnu.tar.gz
